<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BankingSync{{if .Title}} · {{.Title}}{{end}}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #070c18;
  --surface:  #0d1520;
  --raised:   #121d2e;
  --border:   #192840;
  --border-hi:#243654;
  --text:     #dde8f5;
  --dim:      #8ba4c0;
  --muted:    #4a6580;
  --primary:  #6366f1;
  --primary-h:#4f46e5;
  --glow:     rgba(99,102,241,.16);
  --green:    #10b981;
  --green-dim:rgba(16,185,129,.09);
  --amber:    #f59e0b;
  --amber-dim:rgba(245,158,11,.09);
  --red:      #ef4444;
  --red-dim:  rgba(239,68,68,.09);
  --r:        10px;
  --mono:     'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:2rem 1rem 5rem;
  line-height:1.55;
  font-size:15px;
}

/* Shell */
.shell{max-width:740px;margin:0 auto}

/* Topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.35rem;padding:0 .1rem;
}
.logo{display:flex;align-items:center;text-decoration:none}
.logo svg{height:36px;width:auto;display:block}
.topnav{display:flex;gap:.1rem}
.topnav-item{
  padding:.38rem .82rem;border-radius:6px;
  font-size:.82rem;font-weight:500;color:var(--dim);
  text-decoration:none;transition:background .15s,color .15s;
}
.topnav-item:hover{background:var(--raised);color:var(--text)}
.topnav-item.active{background:var(--glow);color:var(--primary)}

/* Card */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:1.75rem 2rem;
  box-shadow:0 8px 40px rgba(0,0,0,.55);position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(99,102,241,.55) 35%,rgba(139,92,246,.55) 65%,transparent 100%);
}

/* Page header */
.page-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:1rem;margin-bottom:1.65rem;
}
.page-title{font-size:1.15rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
.page-sub{font-size:.78rem;color:var(--muted);margin-top:.2rem}

/* Section label */
.section-label{
  font-size:.69rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);margin-bottom:.6rem;
}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.5rem 1rem;border-radius:7px;
  font-size:.84rem;font-weight:600;cursor:pointer;
  text-decoration:none;border:none;
  transition:background .15s,box-shadow .15s,transform .1s;
  white-space:nowrap;line-height:1;
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:var(--primary);color:#fff;
  box-shadow:0 1px 8px var(--glow),0 0 0 1px rgba(99,102,241,.28);
}
.btn-primary:hover{
  background:var(--primary-h);
  box-shadow:0 2px 18px rgba(99,102,241,.38),0 0 0 1px rgba(99,102,241,.4);
}
.btn-ghost{
  background:var(--raised);color:var(--dim);
  border:1px solid var(--border-hi);
}
.btn-ghost:hover{color:var(--text);background:#172033}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:.28rem .65rem;font-size:.78rem}

/* Alerts */
.alert{
  display:flex;gap:.65rem;padding:.8rem 1rem;
  border-radius:8px;margin-bottom:1.1rem;
  font-size:.84rem;line-height:1.5;align-items:flex-start;
}
.alert-icon{flex-shrink:0;margin-top:.05rem;opacity:.85}
.alert-error {background:var(--red-dim);  border:1px solid rgba(239,68,68,.22); color:#fca5a5}
.alert-success{background:var(--green-dim);border:1px solid rgba(16,185,129,.22);color:#6ee7b7}
.alert-info  {background:var(--glow);     border:1px solid rgba(99,102,241,.22);color:#a5b4fc}
.alert-warn  {background:var(--amber-dim);border:1px solid rgba(245,158,11,.22);color:#fcd34d}

/* Badges */
.badge{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.18rem .55rem;border-radius:99px;
  font-size:.71rem;font-weight:600;letter-spacing:.01em;
}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-green{background:var(--green-dim);border:1px solid rgba(16,185,129,.26);color:#6ee7b7}
.badge-green .dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.badge-yellow{background:var(--amber-dim);border:1px solid rgba(245,158,11,.26);color:#fcd34d}
.badge-yellow .dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.badge-red{background:var(--red-dim);border:1px solid rgba(239,68,68,.26);color:#fca5a5}
.badge-red .dot{background:var(--red);box-shadow:0 0 6px var(--red)}

/* Table */
.tbl-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:.1rem}
table{width:100%;border-collapse:collapse;font-size:.845rem}
thead{background:var(--raised)}
th{
  text-align:left;padding:.55rem .9rem;
  font-size:.69rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);border-bottom:1px solid var(--border);
}
td{padding:.72rem .9rem;border-bottom:1px solid var(--border);color:var(--dim);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--raised)}
.td-main{color:var(--text);font-weight:500}

/* Forms */
.field{margin-bottom:1.1rem}
label{display:block;font-size:.78rem;font-weight:500;color:var(--dim);margin-bottom:.38rem}
input[type=text],input[type=file],select{
  width:100%;padding:.58rem .85rem;
  background:var(--bg);border:1px solid var(--border-hi);
  border-radius:7px;color:var(--text);font-size:.875rem;
  transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus,select:focus{
  outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--glow);
}
input:disabled,select:disabled{opacity:.45;cursor:not-allowed}
.field-hint{font-size:.73rem;color:var(--muted);margin-top:.3rem}

/* Code */
.code-block{
  font-family:var(--mono);background:var(--bg);
  border:1px solid var(--border-hi);border-radius:8px;
  padding:.85rem 1rem;font-size:.78rem;color:#a5f3fc;
  word-break:break-all;line-height:1.7;
}

/* Empty state */
.empty{text-align:center;padding:2.75rem 1rem}
.empty-icon{font-size:2rem;margin-bottom:.8rem}
.empty-title{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.35rem}
.empty-desc{font-size:.82rem;color:var(--muted);margin-bottom:1.35rem}

/* Account cards (pick-account) */
.acct-card{
  display:flex;align-items:center;gap:.85rem;padding:.8rem 1rem;
  border:1px solid var(--border);border-radius:8px;cursor:pointer;
  margin-bottom:.45rem;transition:border-color .15s,background .15s;
}
.acct-card:hover{border-color:var(--border-hi);background:var(--raised)}
.acct-card:has(input:checked){border-color:var(--primary);background:var(--glow)}
.acct-card input[type=radio]{accent-color:var(--primary);width:16px;height:16px;flex-shrink:0}
.acct-uid{font-family:var(--mono);font-size:.8rem;color:var(--dim)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}

/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}

/* Utils */
.mt{margin-top:.75rem}
.mt-lg{margin-top:1.5rem}
.actions{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.actions form{display:contents}
.mono{font-family:var(--mono);font-size:.82rem}
</style>
</head>
<body>
<div class="shell">
<header class="topbar">
  <a class="logo" href="/status">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="10 15 480 110">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;800&amp;display=swap');
          .logo-text{font-family:'Outfit',system-ui,-apple-system,sans-serif}
        </style>
        <linearGradient id="coralOrange" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#f43f5e"/>
        </linearGradient>
        <linearGradient id="violetIndigo" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#4c1d95"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <filter id="ribbonShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
      </defs>
      <g transform="translate(10, 5) skewX(-8)" filter="url(#ribbonShadow)">
        <path d="M 40 35 L 80 35 A 20 20 0 0 1 100 55 A 20 20 0 0 1 80 75 L 60 75" fill="none" stroke="url(#coralOrange)" stroke-width="12" stroke-linecap="round"/>
        <polygon points="61,63 41,75 61,87" fill="#f43f5e"/>
        <path d="M 90 95 L 50 95 A 20 20 0 0 1 30 75 A 20 20 0 0 1 50 55 L 70 55" fill="none" stroke="url(#violetIndigo)" stroke-width="12" stroke-linecap="round"/>
        <polygon points="69,43 89,55 69,67" fill="#8b5cf6"/>
        <circle cx="20" cy="25" r="4" fill="#f97316" opacity="0.8"/>
        <circle cx="115" cy="100" r="5" fill="#4c1d95" opacity="0.6"/>
      </g>
      <g transform="translate(135, 84)" class="logo-text">
        <text x="0" y="0" font-size="52" letter-spacing="-1.5">
          <tspan font-weight="800" fill="#f1f5f9">banking</tspan>
          <tspan font-weight="300" fill="url(#coralOrange)">sync</tspan>
          <tspan font-weight="800" fill="#8b5cf6">.</tspan>
        </text>
        <text x="4" y="24" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#4a6580" letter-spacing="4">INTELLIGENT FINANCE</text>
      </g>
    </svg>
  </a>
  <nav class="topnav">
    <a class="topnav-item" href="/status">Status</a>
    <a class="topnav-item" href="/connect">Connect</a>
    <a class="topnav-item" href="/setup">Setup</a>
  </nav>
</header>
<main class="card">
{{template "content" .}}
</main>
</div>
<script>
document.querySelectorAll('.topnav-item').forEach(function(a){
  if(window.location.pathname===a.getAttribute('href'))a.classList.add('active');
});
</script>
</body>
</html>
