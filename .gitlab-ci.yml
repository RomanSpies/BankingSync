---
default:
  tags:
    - internalbuild
  before_script:
    - export PATH="$GOPATH/bin:$PATH"
  after_script:
    - chmod -R u+w "$GOMODCACHE" || true

variables:
  GOPATH: "$CI_PROJECT_DIR/.cache/go"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go/build"
  GOFLAGS: "-mod=readonly"
  GOTOOLCHAIN: "local"
  SONARQUBE: "$CI_PROJECT_DIR/sonarqube"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

stages:
  - build
  - test
  - sast
  - deps
  - sonar
  - docker

.go-cache: &go-cache
  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/go/pkg/mod
      - .cache/go/build

build:
  stage: build
  <<: *go-cache
  script:
    - go build ./...

unit-tests:
  stage: test
  <<: *go-cache
  needs: [build]
  script:
    - mkdir -p "$SONARQUBE"
    - which gotestsum || go install gotest.tools/gotestsum@latest
    - gotestsum --format standard-verbose --jsonfile "$SONARQUBE/test-report.json" --junitfile "$SONARQUBE/junit-report.xml" -- -count=1 -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out | tail -1
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: sonarqube/junit-report.xml
    paths:
      - coverage.out
      - sonarqube/test-report.json
      - sonarqube/junit-report.xml
    expire_in: 7 days

coverage-xml:
  stage: test
  <<: *go-cache
  needs: [unit-tests]
  script:
    - which gocover-cobertura || go install github.com/boumenot/gocover-cobertura@latest
    - gocover-cobertura < coverage.out > coverage.xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days

go-vet:
  stage: sast
  <<: *go-cache
  needs: [build]
  script:
    - go vet ./...

staticcheck:
  stage: sast
  <<: *go-cache
  needs: [build]
  allow_failure: true
  script:
    - which staticcheck || go install honnef.co/go/tools/cmd/staticcheck@latest
    - staticcheck ./...

gosec:
  stage: sast
  <<: *go-cache
  needs: [build]
  allow_failure: true
  script:
    - mkdir -p "$SONARQUBE"
    - which gosec || go install github.com/securego/gosec/v2/cmd/gosec@latest
    - gosec -exclude-dir .cache -fmt sarif -out "$SONARQUBE/gosec.sarif" -severity medium ./... || true
  artifacts:
    when: always
    paths:
      - sonarqube/gosec.sarif
    expire_in: 7 days

golangci-lint:
  stage: sast
  <<: *go-cache
  needs: [build]
  allow_failure: true
  script:
    - mkdir -p "$SONARQUBE"
    - which golangci-lint || go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run --out-format checkstyle ./... > "$SONARQUBE/golangci-checkstyle.xml" 2>&1 || true
  artifacts:
    when: always
    paths:
      - sonarqube/golangci-checkstyle.xml
    expire_in: 7 days

dependency-scan:
  stage: deps
  needs: [build]
  allow_failure: true
  script:
    - trivy fs --scanners vuln --format template
        --template "@/usr/local/share/trivy/templates/gitlab.tpl"
        -o gl-dependency-scanning-report.json .
  artifacts:
    when: always
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    expire_in: 7 days

sonar-job:
  stage: sonar
  needs:
    - unit-tests
    - coverage-xml
    - golangci-lint
    - gosec
  allow_failure: false
  script:
    - sonar-scanner
        -Dsonar.token=$SONAR_TOKEN
        -Dsonar.projectKey=$SONAR_PROJECT_KEY
        -Dsonar.sources=.
        -Dsonar.exclusions=**/*_test.go,**/.cache/**
        -Dsonar.tests=.
        -Dsonar.test.inclusions=**/*_test.go
        -Dsonar.coverage.exclusions=main.go,telemetry.go,email.go,actual/client.go,enablebanking/client.go
        -Dsonar.go.coverage.reportPaths=coverage.out
        -Dsonar.go.tests.reportPaths=$SONARQUBE/test-report.json
        -Dsonar.go.golangci-lint.reportPaths=$SONARQUBE/golangci-checkstyle.xml
        -Dsonar.sarifReportPaths=$SONARQUBE/gosec.sarif
        -Dsonar.qualitygate.wait=true

docker-build-dev:
  stage: docker
  needs: [unit-tests, go-vet, gofmt]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker build
        --build-arg VERSION="dev-1.$(date +%-y).$(date +%-V).${CI_PIPELINE_IID}"
        -t "$DOCKER_HUB_USER/bankingsync:dev"
        .
    - docker push "$DOCKER_HUB_USER/bankingsync:dev"
    - docker logout
  after_script:
    - docker logout || true

docker-build-push:
  stage: docker
  needs: [unit-tests]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - VERSION="1.$(date +%-y).$(date +%-V).${CI_PIPELINE_IID}"
    - echo "Building version ${VERSION}"
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker build
        --build-arg VERSION="$VERSION"
        -t "$DOCKER_HUB_USER/bankingsync:$VERSION"
        -t "$DOCKER_HUB_USER/bankingsync:latest"
        .
    - docker push "$DOCKER_HUB_USER/bankingsync:$VERSION"
    - docker push "$DOCKER_HUB_USER/bankingsync:latest"
    - docker logout
    - git tag "$VERSION" "$CI_COMMIT_SHA" 2>/dev/null || true
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$VERSION" 2>/dev/null || true
    - >-
      curl -s -X PATCH
      "https://hub.docker.com/v2/repositories/$DOCKER_HUB_USER/bankingsync/"
      -H "Authorization: Bearer $DOCKER_HUB_PAT"
      -H "Content-Type: application/json"
      --data "$(jq -Rs '{"full_description": .}' < README.md)"
      || true
  after_script:
    - docker logout || true

gofmt:
  stage: sast
  needs: []
  script:
    - |
      unformatted=$(gofmt -l .)
      if [ -n "$unformatted" ]; then
        echo "The following files are not gofmt'd:"
        echo "$unformatted"
        exit 1
      fi
