<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="100%" height="100%" style="max-width: 650px; background-color: #ffffff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); padding: 10px;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;800&amp;display=swap');
      .logo-text {
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      }
    </style>

    <linearGradient id="coralOrange" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <linearGradient id="violetIndigo" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <filter id="ribbonShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <g transform="translate(10, 5) skewX(-8)" filter="url(#ribbonShadow)">
    
    <path 
      d="M 40 35 L 80 35 A 20 20 0 0 1 100 55 A 20 20 0 0 1 80 75 L 60 75" 
      fill="none" 
      stroke="url(#coralOrange)" 
      stroke-width="12" 
      stroke-linecap="round" 
    />
    <polygon points="61,63 41,75 61,87" fill="#f43f5e" />

    <path 
      d="M 90 95 L 50 95 A 20 20 0 0 1 30 75 A 20 20 0 0 1 50 55 L 70 55" 
      fill="none" 
      stroke="url(#violetIndigo)" 
      stroke-width="12" 
      stroke-linecap="round" 
    />
    <polygon points="69,43 89,55 69,67" fill="#8b5cf6" />

    <circle cx="20" cy="25" r="4" fill="#f97316" opacity="0.8" />
    <circle cx="115" cy="100" r="5" fill="#4c1d95" opacity="0.6" />
  </g>

  <g transform="translate(135, 84)" class="logo-text">
    <text x="0" y="0" font-size="52" letter-spacing="-1.5">
      <tspan font-weight="800" fill="#1e1b4b">banking</tspan>
      <tspan font-weight="300" fill="url(#coralOrange)">sync</tspan>
      <tspan font-weight="800" fill="#8b5cf6">.</tspan>
    </text>
    
    <text x="4" y="24" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="4">
      INTELLIGENT FINANCE
    </text>
  </g>
</svg>
